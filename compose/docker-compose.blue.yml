# ───────────────────────────────────────────────────────────────────
# BLUE STACK — Application services (port 8001/3001)
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.blue.yml up -d
# ───────────────────────────────────────────────────────────────────
services:
  web-blue:
    build:
      context: ..
      target: runtime
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-acme_saas}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - S3_ENDPOINT_URL=http://minio:9000
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DEPLOY_COLOR=blue
    env_file:
      - ../production.env
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend-blue:
    build:
      context: ../frontend
      target: runner
    environment:
      DJANGO_BASE_URL: http://web-blue:8000
      NEXT_TELEMETRY_DISABLED: "1"
      DEPLOY_COLOR: blue
    networks:
      - frontend_net
    depends_on:
      web-blue:
        condition: service_healthy
    restart: unless-stopped

  worker-blue:
    build:
      context: ..
      target: runtime
    command: celery -A config.celery worker -l info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-acme_saas}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ../production.env
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat-blue:
    build:
      context: ..
      target: runtime
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-acme_saas}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    env_file:
      - ../production.env
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
